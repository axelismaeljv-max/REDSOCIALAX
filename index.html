<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social — Portafolio Axel</title>

    <style>
        /* ============================================================
           RESET & BASE
        ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:          #07071a;
            --surface:     #0c0c24;
            --surface2:    #12122a;
            --border:      rgba(255, 255, 255, 0.08);
            --accent:      #c2185b;
            --accent-glow: rgba(194, 24, 91, 0.20);
            --text:        #ffffff;
            --text-muted:  #8888aa;
        }

        html, body {
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo con gradiente radial sutil (mismo estilo que el dashboard) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(194, 24, 91, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(107, 107, 255, 0.06) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           LAYOUT
        ============================================================ */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        /* ============================================================
           TOPBAR
        ============================================================ */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .servicio-nombre {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .sep {
            width: 1px;
            height: 18px;
            background: var(--border);
        }

        /* Ícono de Instagram */
        .ig-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px 4px 8px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .ig-badge svg { flex-shrink: 0; }

        /* ============================================================
           ÁREA PRINCIPAL — tarjeta centrada
        ============================================================ */
        .main-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 10px 0 30px;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Tarjeta contenedora del embed */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03);
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        /* Línea decorativa superior color accent */
        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        /* Encabezado de la tarjeta */
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .ig-logo-wrap {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-header-text h3 {
            font-size: 0.88rem;
            font-weight: 700;
        }

        .card-header-text p {
            font-size: 0.74rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Contenedor del blockquote de Instagram */
        .embed-wrap {
            border-radius: 10px;
            overflow: hidden;
        }

        /* El blockquote de Instagram se adapta al ancho del contenedor */
        .instagram-media {
            border-radius: 10px !important;
            overflow: hidden !important;
            min-width: unset !important;
            max-width: 100% !important;
            width: 100% !important;
        }

        /* ============================================================
           FOOTER
        ============================================================ */
        .footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            padding-bottom: 8px;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 560px) {
            .page { padding: 14px; }
            .post-card { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- TOPBAR -->
    <div class="topbar">
        <span class="servicio-nombre">RedSocialAxel</span>
        <div class="sep"></div>
        <div class="ig-badge">
            <!-- Ícono Instagram -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="url(#igGrad)" stroke-width="2">
                <defs>
                    <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#f09433"/>
                        <stop offset="50%"  stop-color="#dc2743"/>
                        <stop offset="100%" stop-color="#bc1888"/>
                    </linearGradient>
                </defs>
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="0.5" fill="#dc2743" stroke="none"/>
            </svg>
            Instagram
        </div>
    </div>

    <!-- TARJETA CON EL POST -->
    <div class="main-area">
        <div class="post-card">

            <div class="card-header">
                <div class="ig-logo-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <circle cx="12" cy="12" r="4"/>
                        <circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/>
                    </svg>
                </div>
                <div class="card-header-text">
                    <h3>Publicación de Instagram</h3>
                    <p>Portafolio Axel — Red Social</p>
                </div>
            </div>

            <!-- =====================================================
                 EMBED DE INSTAGRAM
                 Para cambiar la publicación, reemplaza la URL en:
                 data-instgrm-permalink="URL_DEL_POST_AQUI"
                 Ejemplo:
                 https://www.instagram.com/p/CODIGO_DEL_POST/
            ===================================================== -->
            <div class="embed-wrap">
                <blockquote
                    class="instagram-media"
                    data-instgrm-permalink="https://www.instagram.com/reel/DTGmy1KkoyM/?igsh=OXR3NGZyMXB4eGdm"
                    data-instgrm-version="14"
                    style="background:#FFF; border:0; margin:0 auto;">
                </blockquote>
            </div>

        </div>
    </div>

    <div class="footer">Portafolio Axel &mdash; Servicio Red Social</div>

</div>

<!-- Script oficial de Instagram para renderizar el embed -->
<script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
